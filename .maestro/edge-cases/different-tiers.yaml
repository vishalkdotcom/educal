appId: ${APP_ID}
name: "Different costs - Enter different annual costs and verify plan updates"
---
# Navigate to Step 2
- assertVisible:
    id: "step1-screen"
- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "10"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

# === Step 2 - Enter a low annual cost ===
- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "annual-cost-input"
- inputText: "2000"
- tapOn:
    id: "step2-next-button"

# === Step 3 - Verify savings plan with low cost ===
- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "9000"
- tapOn:
    id: "savings-input"
- inputText: "20000"

- assertVisible:
    id: "savings-goal-amount"

# Go back to try higher cost
- tapOn:
    id: "step3-back-button"
- assertVisible:
    id: "step2-screen"

# Clear and enter higher cost
- tapOn:
    id: "annual-cost-input"
- eraseText: 4
- inputText: "15000"

- tapOn:
    id: "step2-next-button"
- assertVisible:
    id: "step3-screen"

# Savings goal should update with higher cost
- assertVisible:
    id: "savings-goal-amount"

# Complete onboarding
- tapOn:
    id: "step3-next-button"
- assertVisible:
    id: "home-screen"
