appId: ${APP_ID}
name: "Step 2 validation - School cost is required before proceeding"
---
# Navigate to Step 2
- assertVisible:
    id: "step1-screen"
- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

# === Step 2 ===
- assertVisible:
    id: "step2-screen"

# Try to proceed without entering cost — button is disabled (canProceed = false)
- tapOn:
    id: "step2-next-button"
- assertVisible:
    id: "step2-screen"

# Enter annual cost — now should be able to proceed
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"

- tapOn:
    id: "step2-next-button"
- assertVisible:
    id: "step3-screen"
