appId: ${APP_ID}
name: "Step 3 validation - Income is required"
---
# Navigate to Step 3
- runFlow: ../helpers/complete-step1-and-step2.yaml

# === Step 3 ===
# Try to proceed without entering income — button requires income > 0
- tapOn:
    id: "step3-next-button"
- assertVisible:
    id: "step3-screen"

# Enter only savings (income still missing)
- tapOn:
    id: "savings-input"
- inputText: "5000"
- tapOn:
    id: "step3-next-button"
- assertVisible:
    id: "step3-screen"

# Now enter income — should allow proceeding
- tapOn:
    id: "income-input"
- inputText: "6000"
- tapOn:
    id: "step3-next-button"
- assertVisible:
    id: "home-screen"
