appId: ${APP_ID}
name: "Multiple children - Add two children and verify breakdown"
---
- assertVisible:
    id: "step1-screen"

# Add first child and save
- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
# Target level defaults to University
- tapOn:
    id: "child-save-0"

# Verify first child card appears
- assertVisible:
    id: "child-card-0"

# Add second child
- tapOn:
    id: "add-another-child"
- tapOn:
    id: "child-name-input-1"
- inputText: "Liam"
- tapOn:
    id: "child-age-input-1"
- inputText: "5"
- tapOn:
    id: "child-target-level-1"
- tapOn: "High School"
- tapOn:
    id: "child-save-1"

# Verify both child cards
- assertVisible:
    id: "child-card-0"
- assertVisible:
    id: "child-card-1"

# Proceed through Step 2
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- scrollUntilVisible:
    element:
      id: "annual-cost-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "annual-cost-input"
- inputText: "8000"
- tapOn:
    id: "step2-next-button"

# === Step 3 - Verify per-child breakdown ===
- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "12000"
- tapOn:
    id: "savings-input"
- inputText: "25000"

- assertVisible:
    id: "savings-goal-amount"

# Both children should have breakdowns
- scrollUntilVisible:
    element:
      id: "child-breakdown-0"
    direction: DOWN
    timeout: 5000
- scrollUntilVisible:
    element:
      id: "child-breakdown-1"
    direction: DOWN
    timeout: 5000

# Complete onboarding
- tapOn:
    id: "step3-next-button"

# === Verify dashboard shows both children ===
- assertVisible:
    id: "home-screen"
- scrollUntilVisible:
    element:
      id: "horizon-child-0"
    direction: DOWN
    timeout: 5000
- scrollUntilVisible:
    element:
      id: "horizon-child-1"
    direction: DOWN
    timeout: 5000
