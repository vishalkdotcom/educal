appId: ${APP_ID}
name: "Multiple children - Add two children and verify breakdown"
---
- assertVisible:
    id: "step1-screen"

# Add first child — fill form and tap Next to auto-save + navigate to step 2
- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
# Target level defaults to University

- tapOn:
    id: "step1-next-button"

# Go back from Step 2 to Step 1 to add another child
- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "step2-back-button"
- assertVisible:
    id: "step1-screen"

# First child should be saved as a card
- assertVisible:
    id: "child-card-0"

# Add second child
- tapOn:
    id: "add-another-child"
- tapOn:
    id: "child-name-input"
- inputText: "Liam"
- tapOn:
    id: "child-age-input"
- inputText: "5"
- tapOn:
    id: "child-target-level"
- tapOn: "High School"
- tapOn:
    id: "save-child-button"

# Verify both child cards
- assertVisible:
    id: "child-card-0"
- assertVisible:
    id: "child-card-1"

# Proceed
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "income-input"
- inputText: "12000"
- tapOn:
    id: "savings-input"
- inputText: "25000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "tier-card-international"
- tapOn:
    id: "step3-next-button"

# === Step 4 - Verify per-child breakdown ===
- assertVisible:
    id: "step4-screen"
- assertVisible:
    id: "savings-goal-amount"

# Both children should have breakdowns
- assertVisible:
    id: "child-breakdown-0"
- assertVisible:
    id: "child-breakdown-1"
- assertVisible:
    id: "child-share-0"
- assertVisible:
    id: "child-share-1"

# Complete onboarding
- tapOn:
    id: "step4-next-button"

# === Verify dashboard shows both children ===
- assertVisible:
    id: "horizon-screen"
- assertVisible:
    id: "horizon-child-0"
- assertVisible:
    id: "horizon-child-1"
