appId: ${APP_ID}
name: "Full E2E - Complete app flow covering all screens"
---
# ===================================================================
# FULL END-TO-END TEST
# Covers: Onboarding (all 3 steps) → All 4 tabs
# ===================================================================

# === STEP 1: Who are you saving for? ===
- assertVisible:
    id: "step1-screen"
- assertVisible:
    id: "step1-progress-bar"

# Fill child details (first pending card at index 0)
- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
# Target level defaults to University
- tapOn:
    id: "child-save-0"

- tapOn:
    id: "step1-next-button"

# === STEP 2: Where will they study? ===
- assertVisible:
    id: "step2-screen"
- assertVisible:
    id: "step2-progress-bar"

# Enter annual cost directly
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"

- tapOn:
    id: "step2-next-button"

# === STEP 3: Your Savings Plan ===
- assertVisible:
    id: "step3-screen"
- assertVisible:
    id: "step3-progress-bar"

- tapOn:
    id: "income-input"
- inputText: "10000"
- tapOn:
    id: "savings-input"
- inputText: "20000"

- assertVisible:
    id: "savings-goal-amount"
- assertVisible:
    id: "child-breakdown-0"

- scrollUntilVisible:
    element:
      id: "calculation-factors"
    direction: DOWN
    timeout: 5000

- tapOn:
    id: "step3-next-button"

# === HOME TAB ===
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-goal-card"
- scrollUntilVisible:
    element:
      id: "horizon-child-0"
    direction: DOWN
    timeout: 5000
- scrollUntilVisible:
    element:
      id: "home-update-plan"
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: "home-view-report"

# === PROGRESS TAB (via View Progress button) ===
- tapOn:
    id: "home-view-report"
- assertVisible:
    id: "progress-screen"
- assertVisible:
    id: "growth-projection-card"
- assertVisible:
    id: "growth-projection-amount"

- scrollUntilVisible:
    element:
      id: "funding-source-0"
    direction: DOWN
    timeout: 5000

- scrollUntilVisible:
    element:
      id: "child-goal-0"
    direction: DOWN
    timeout: 5000

# === SCHOOLS TAB ===
- tapOn: "Schools"
- assertVisible:
    id: "schools-screen"
- assertVisible:
    id: "school-search-input"

# === PROFILE TAB ===
- tapOn: "Profile"
- assertVisible:
    id: "profile-screen"
- assertVisible: "Sophia"

# === Return to Home ===
- tapOn: "Home"
- assertVisible:
    id: "home-screen"
