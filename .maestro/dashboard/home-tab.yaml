appId: ${APP_ID}
name: "Home tab - Dashboard overview after onboarding"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step3-next-button"

# === Verify Home Dashboard ===
- assertVisible:
    id: "home-screen"

# Verify monthly goal card is present
- assertVisible:
    id: "home-goal-card"

# Verify child progress section
- scrollUntilVisible:
    element:
      id: "horizon-child-0"
    direction: DOWN
    timeout: 5000

# Verify quick action buttons
- scrollUntilVisible:
    element:
      id: "home-update-plan"
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: "home-view-report"
