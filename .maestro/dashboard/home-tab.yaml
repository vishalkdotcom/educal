appId: ${APP_ID}
name: "Home tab - Dashboard overview after onboarding"
---
# === Complete onboarding first ===
- runFlow: ../helpers/complete-onboarding.yaml

# === Verify Home Dashboard ===
- assertVisible:
    id: "home-screen"

# Verify monthly goal card is present
- assertVisible:
    id: "home-goal-card"

# Verify child progress section
- scrollUntilVisible:
    element:
      id: "horizon-child-0"
    direction: DOWN
    timeout: 5000

# Verify quick action buttons
- scrollUntilVisible:
    element:
      id: "home-update-plan"
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: "home-view-report"
