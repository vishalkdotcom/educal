appId: ${APP_ID}
name: "Progress tab - Track savings progress"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step3-next-button"

# === Navigate to Progress tab ===
- assertVisible:
    id: "home-screen"
- tapOn: "Progress"

# === Verify Progress screen ===
- assertVisible:
    id: "progress-screen"

# Growth projection card
- assertVisible:
    id: "growth-projection-card"
- assertVisible:
    id: "growth-projection-amount"

# Growth chart
- assertVisible:
    id: "growth-chart"

# Funding sources
- scrollUntilVisible:
    element:
      id: "funding-source-0"
    direction: DOWN
    timeout: 5000

# Child goals
- scrollUntilVisible:
    element:
      id: "child-goal-0"
    direction: DOWN
    timeout: 5000

# Milestones section
- scrollUntilVisible:
    element:
      id: "milestones-section"
    direction: DOWN
    timeout: 5000
