appId: ${APP_ID}
name: "Progress tab - Track savings progress"
---
# === Complete onboarding first ===
- runFlow: ../helpers/complete-onboarding.yaml

# === Navigate to Progress tab ===
- tapOn: "Progress"

# === Verify Progress screen ===
- assertVisible:
    id: "progress-screen"

# Growth projection card
- assertVisible:
    id: "growth-projection-card"
- assertVisible:
    id: "growth-projection-amount"

# Growth chart
- assertVisible:
    id: "growth-chart"

# Funding sources
- scrollUntilVisible:
    element:
      id: "funding-source-0"
    direction: DOWN
    timeout: 5000

# Child goals
- scrollUntilVisible:
    element:
      id: "child-goal-0"
    direction: DOWN
    timeout: 5000

# Milestones section
- scrollUntilVisible:
    element:
      id: "milestones-section"
    direction: DOWN
    timeout: 5000
