appId: ${APP_ID}
name: "Insights tab - Education Wealth Report"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
- tapOn:
    id: "child-target-level"
- tapOn: "University"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "tier-card-private"
- tapOn:
    id: "step3-next-button"

- assertVisible:
    id: "step4-screen"
- tapOn:
    id: "step4-next-button"

# === Navigate to Insights tab ===
- assertVisible:
    id: "horizon-screen"
- tapOn:
    id: "horizon-view-report"

# === Verify Insights screen ===
- assertVisible:
    id: "insights-screen"

# Growth projection card
- assertVisible:
    id: "growth-projection-card"
- assertVisible:
    id: "growth-projection-amount"

# Growth chart
- assertVisible:
    id: "growth-chart"

# Tax savings card
- scrollUntilVisible:
    element:
      id: "tax-savings-amount"
    direction: DOWN
    timeout: 5000

# Funding sources
- scrollUntilVisible:
    element:
      id: "funding-source-0"
    direction: DOWN
    timeout: 5000

# Child goals
- scrollUntilVisible:
    element:
      id: "child-goal-0"
    direction: DOWN
    timeout: 5000

# Milestones section
- scrollUntilVisible:
    element:
      id: "milestones-section"
    direction: DOWN
    timeout: 5000
