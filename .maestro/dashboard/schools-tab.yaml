appId: ${APP_ID}
name: "Schools tab - Browse and search schools"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step3-next-button"

# === Navigate to Schools tab ===
- assertVisible:
    id: "home-screen"
- tapOn: "Schools"

# === Verify Schools screen ===
- assertVisible:
    id: "schools-screen"

# Search bar is visible
- assertVisible:
    id: "school-search-input"

# Filter pills visible
- assertVisible:
    id: "filter-all"
