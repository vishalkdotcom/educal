appId: ${APP_ID}
name: "Profile tab - View profile and settings"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step3-next-button"

# === Navigate to Profile tab ===
- assertVisible:
    id: "home-screen"
- tapOn: "Profile"

# === Verify Profile screen ===
- assertVisible:
    id: "profile-screen"

# Verify child info is displayed
- assertVisible: "Sophia"

# Verify financial details
- assertVisible: "8 years old"
