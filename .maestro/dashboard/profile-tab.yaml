appId: ${APP_ID}
name: "Profile tab - View profile and settings"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
- tapOn:
    id: "child-target-level"
- tapOn: "University"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "tier-card-private"
- tapOn:
    id: "step3-next-button"

- assertVisible:
    id: "step4-screen"
- tapOn:
    id: "step4-next-button"

# === Navigate to Profile tab ===
- assertVisible:
    id: "horizon-screen"
- tapOn: "Profile"

# === Verify Profile screen ===
- assertVisible:
    id: "profile-screen"

# Verify child info is displayed
- assertVisible: "Sophia"

# Verify financial details show entered values
- assertVisible: "$8,500"
- assertVisible: "$15,000"

# Verify education tier
- assertVisible: "Private"
