appId: ${APP_ID}
name: "Horizon tab - Dashboard overview after onboarding"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
- tapOn:
    id: "child-target-level"
- tapOn: "University"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "tier-card-private"
- tapOn:
    id: "step3-next-button"

- assertVisible:
    id: "step4-screen"
- tapOn:
    id: "step4-next-button"

# === Verify Horizon Dashboard ===
- assertVisible:
    id: "horizon-screen"

# Verify monthly goal card is present
- assertVisible:
    id: "horizon-goal-card"

# Verify child progress section
- assertVisible:
    id: "horizon-child-0"

# Verify quick action buttons
- assertVisible:
    id: "horizon-update-plan"
- assertVisible:
    id: "horizon-view-report"
