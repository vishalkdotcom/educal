appId: ${APP_ID}
name: "Funding tab - School search and navigation"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
- tapOn:
    id: "child-target-level"
- tapOn: "University"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "tier-card-private"
- tapOn:
    id: "step3-next-button"

- assertVisible:
    id: "step4-screen"
- tapOn:
    id: "step4-next-button"

# === Navigate to Funding tab ===
- assertVisible:
    id: "horizon-screen"
- tapOn: "Schools"

# === Verify Funding screen ===
- assertVisible:
    id: "funding-screen"

# Search bar is visible
- assertVisible:
    id: "school-search-input"

# At least one school card should appear
- assertVisible:
    id: "school-card-0"

# Tap on a school card to open detail modal
- tapOn:
    id: "school-card-0"

# === Verify School Detail Modal ===
- assertVisible:
    id: "school-detail-screen"
- assertVisible:
    id: "school-name"
- assertVisible:
    id: "school-annual-tuition"

# Verify forecast cards
- assertVisible:
    id: "forecast-5yr"
- assertVisible:
    id: "forecast-10yr"
- assertVisible:
    id: "forecast-15yr"

# Verify tuition path chart
- assertVisible:
    id: "tuition-path-chart"

# Verify degree total card
- scrollUntilVisible:
    element:
      id: "degree-total-card"
    direction: DOWN
    timeout: 5000
- assertVisible:
    id: "degree-total-amount"

# Verify add to plan button
- scrollUntilVisible:
    element:
      id: "add-to-plan-button"
    direction: DOWN
    timeout: 5000
