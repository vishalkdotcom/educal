appId: ${APP_ID}
name: "Tab navigation - Switch between all tabs"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "annual-cost-input"
- inputText: "3000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "7000"
- tapOn:
    id: "savings-input"
- inputText: "10000"
- tapOn:
    id: "step3-next-button"

# === Tab Switching ===

# Start on Home
- assertVisible:
    id: "home-screen"

# Switch to Progress
- tapOn: "Progress"
- assertVisible:
    id: "progress-screen"

# Switch to Schools
- tapOn: "Schools"
- assertVisible:
    id: "schools-screen"

# Switch to Profile
- tapOn: "Profile"
- assertVisible:
    id: "profile-screen"

# Switch back to Home
- tapOn: "Home"
- assertVisible:
    id: "home-screen"

# Rapid switching - stress test
- tapOn: "Schools"
- assertVisible:
    id: "schools-screen"
- tapOn: "Progress"
- assertVisible:
    id: "progress-screen"
- tapOn: "Home"
- assertVisible:
    id: "home-screen"
