appId: ${APP_ID}
name: "Tab navigation - Switch between all tabs"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
- tapOn:
    id: "child-target-level"
- tapOn: "University"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "income-input"
- inputText: "7000"
- tapOn:
    id: "savings-input"
- inputText: "10000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "tier-card-public"
- tapOn:
    id: "step3-next-button"

- assertVisible:
    id: "step4-screen"
- tapOn:
    id: "step4-next-button"

# === Tab Switching ===

# Start on Horizon
- assertVisible:
    id: "horizon-screen"

# Switch to Insights
- tapOn: "Insights"
- assertVisible:
    id: "insights-screen"

# Switch to Funding
- tapOn: "Funding"
- assertVisible:
    id: "funding-screen"

# Switch to Profile
- tapOn: "Profile"
- assertVisible:
    id: "profile-screen"

# Switch back to Horizon
- tapOn: "Horizon"
- assertVisible:
    id: "horizon-screen"

# Rapid switching - stress test
- tapOn: "Funding"
- assertVisible:
    id: "funding-screen"
- tapOn: "Insights"
- assertVisible:
    id: "insights-screen"
- tapOn: "Horizon"
- assertVisible:
    id: "horizon-screen"
