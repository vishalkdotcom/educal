appId: ${APP_ID}
name: "Tab navigation - Switch between all tabs"
---
# === Complete onboarding first ===
- runFlow: ../helpers/complete-onboarding.yaml

# === Tab Switching ===

# Start on Home
- assertVisible:
    id: "home-screen"

# Switch to Progress
- tapOn: "Progress"
- assertVisible:
    id: "progress-screen"

# Switch to Schools
- tapOn: "Schools"
- assertVisible:
    id: "schools-screen"

# Switch to Profile
- tapOn: "Profile"
- assertVisible:
    id: "profile-screen"

# Switch back to Home
- tapOn: "Home"
- assertVisible:
    id: "home-screen"

# Rapid switching - stress test
- tapOn: "Schools"
- assertVisible:
    id: "schools-screen"
- tapOn: "Progress"
- assertVisible:
    id: "progress-screen"
- tapOn: "Home"
- assertVisible:
    id: "home-screen"
