appId: ${APP_ID}
name: "Back navigation - Navigate backwards through onboarding"
---
# === Start at Step 1 ===
- assertVisible:
    id: "step1-screen"

# Fill and save a child
- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

# === Step 2 ===
- assertVisible:
    id: "step2-screen"
- scrollUntilVisible:
    element:
      id: "annual-cost-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"
- tapOn:
    id: "step2-next-button"

# === Step 3 ===
- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"

# Go back to Step 2
- tapOn:
    id: "step3-back-button"
- assertVisible:
    id: "step2-screen"

# Go back to Step 1
- tapOn:
    id: "step2-back-button"
- assertVisible:
    id: "step1-screen"

# Verify child data persisted
- assertVisible:
    id: "child-card-0"

# Go forward again
- tapOn:
    id: "step1-next-button"
- assertVisible:
    id: "step2-screen"

# Continue to Step 3
- tapOn:
    id: "step2-next-button"
- assertVisible:
    id: "step3-screen"

# Go back from Step 3 again
- tapOn:
    id: "step3-back-button"
- assertVisible:
    id: "step2-screen"
