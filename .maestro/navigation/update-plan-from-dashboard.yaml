appId: ${APP_ID}
name: "Update plan - Navigate from dashboard back to onboarding"
---
# === Complete onboarding first ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
- tapOn:
    id: "child-target-level"
- tapOn: "University"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"
- tapOn:
    id: "step2-next-button"

- assertVisible:
    id: "step3-screen"
- tapOn:
    id: "tier-card-private"
- tapOn:
    id: "step3-next-button"

- assertVisible:
    id: "step4-screen"
- tapOn:
    id: "step4-next-button"

# === On Dashboard, tap Update Plan ===
- assertVisible:
    id: "horizon-screen"
- tapOn:
    id: "horizon-update-plan"

# Should navigate back to onboarding Step 1
- assertVisible:
    id: "step1-screen"

# Verify existing child data is still shown
- assertVisible:
    id: "child-card-0"
