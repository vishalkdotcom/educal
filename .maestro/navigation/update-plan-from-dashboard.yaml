appId: ${APP_ID}
name: "Update plan - Navigate from dashboard back to onboarding"
---
# === Complete onboarding first ===
- runFlow: ../helpers/complete-onboarding.yaml

# === On Dashboard, tap Update Plan ===
- scrollUntilVisible:
    element:
      id: "home-update-plan"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "home-update-plan"

# Should navigate back to onboarding Step 1
- assertVisible:
    id: "step1-screen"

# Verify existing child data is still shown
- assertVisible:
    id: "child-card-0"
