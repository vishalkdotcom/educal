appId: ${APP_ID}
name: "Step 1 - Add a child and proceed"
---
# Wait for onboarding Step 1 to load
- assertVisible:
    id: "step1-screen"

# Verify progress bar shows 33%
- assertVisible:
    id: "step1-progress-bar"

# Fill in child details (first pending card is at index 0)
- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"

- tapOn:
    id: "child-age-input-0"
- inputText: "8"

# Target level defaults to University — no change needed

# Save the child card
- tapOn:
    id: "child-save-0"

# Verify saved card appears in view mode
- assertVisible:
    id: "child-card-0"

# Tap Next to proceed to Step 2
- tapOn:
    id: "step1-next-button"

# Verify we navigated to Step 2
- assertVisible:
    id: "step2-screen"
