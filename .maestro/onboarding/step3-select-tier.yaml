appId: ${APP_ID}
name: "Step 3 - Select education tier"
---
- assertVisible:
    id: "step3-screen"

# Verify progress bar shows 75%
- assertVisible:
    id: "step3-progress-bar"

# Verify all tier cards are visible
- assertVisible:
    id: "tier-card-public"
- assertVisible:
    id: "tier-card-private"
- assertVisible:
    id: "tier-card-international"

# Select Private Academy tier
- tapOn:
    id: "tier-card-private"

# Verify cost projection card appears
- assertVisible:
    id: "cost-projection-card"

# Proceed to Step 4
- tapOn:
    id: "step3-next-button"
- assertVisible:
    id: "step4-screen"
