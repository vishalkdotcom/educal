appId: ${APP_ID}
name: "Complete onboarding flow - end to end"
---
# === STEP 1: Family Profile ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input"
- inputText: "8"
- tapOn:
    id: "child-target-level"
- tapOn: "University"

- tapOn:
    id: "step1-next-button"

# === STEP 2: Financial Snapshot ===
- assertVisible:
    id: "step2-screen"

- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"

- tapOn:
    id: "step2-next-button"

# === STEP 3: Education Goal ===
- assertVisible:
    id: "step3-screen"

- tapOn:
    id: "tier-card-private"

- tapOn:
    id: "step3-next-button"

# === STEP 4: Savings Result ===
- assertVisible:
    id: "step4-screen"
- assertVisible:
    id: "savings-goal-amount"
- assertVisible:
    id: "child-breakdown-0"

# Navigate to dashboard
- tapOn:
    id: "step4-next-button"

# === Dashboard: Horizon ===
- assertVisible:
    id: "horizon-screen"
