appId: ${APP_ID}
name: "Complete onboarding flow - end to end"
---
# === STEP 1: Who are you saving for? ===
- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
# Target level defaults to University
- tapOn:
    id: "child-save-0"

- tapOn:
    id: "step1-next-button"

# === STEP 2: Where will they study? ===
- assertVisible:
    id: "step2-screen"

# Enter annual cost directly
- scrollUntilVisible:
    element:
      id: "annual-cost-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"

- tapOn:
    id: "step2-next-button"

# === STEP 3: Your Savings Plan ===
- assertVisible:
    id: "step3-screen"

- tapOn:
    id: "income-input"
- inputText: "8500"
- tapOn:
    id: "savings-input"
- inputText: "15000"

- assertVisible:
    id: "savings-goal-amount"
- scrollUntilVisible:
    element:
      id: "child-breakdown-0"
    direction: DOWN
    timeout: 5000

# Complete onboarding
- tapOn:
    id: "step3-next-button"

# === Dashboard: Home ===
- assertVisible:
    id: "home-screen"
