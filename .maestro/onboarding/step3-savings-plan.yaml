appId: ${APP_ID}
name: "Step 3 - Your Savings Plan"
---
# Navigate to Step 3 first
- runFlow: ../helpers/complete-step1-and-step2.yaml

- assertVisible:
    id: "step3-screen"

# Verify progress bar shows 100%
- assertVisible:
    id: "step3-progress-bar"

# Enter monthly income
- tapOn:
    id: "income-input"
- inputText: "8500"

# Enter current savings
- tapOn:
    id: "savings-input"
- inputText: "15000"

# Verify savings goal appears
- assertVisible:
    id: "savings-goal-amount"

# Verify child breakdown is visible
- scrollUntilVisible:
    element:
      id: "child-breakdown-0"
    direction: DOWN
    timeout: 5000

# Tap Start Tracking to complete onboarding
- tapOn:
    id: "step3-next-button"

# Verify we land on Home dashboard
- assertVisible:
    id: "home-screen"
