appId: ${APP_ID}
name: "Step 2 - Enter financial details"
---
- assertVisible:
    id: "step2-screen"

# Verify progress bar shows 50%
- assertVisible:
    id: "step2-progress-bar"

# Enter monthly income
- tapOn:
    id: "income-input"
- inputText: "8500"

# Enter current savings
- tapOn:
    id: "savings-input"
- inputText: "15000"

# Proceed to Step 3
- tapOn:
    id: "step2-next-button"
- assertVisible:
    id: "step3-screen"
