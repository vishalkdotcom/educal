appId: ${APP_ID}
name: "Step 2 - Set location and school cost"
---
# Navigate to Step 2 first
- runFlow: ../helpers/complete-step1.yaml

- assertVisible:
    id: "step2-screen"

# Verify progress bar shows 66%
- assertVisible:
    id: "step2-progress-bar"

# Enter annual cost directly (custom cost input is visible when no school selected)
- scrollUntilVisible:
    element:
      id: "annual-cost-input"
    direction: DOWN
    timeout: 5000
- tapOn:
    id: "annual-cost-input"
- inputText: "5000"

# Proceed to Step 3
- tapOn:
    id: "step2-next-button"
- assertVisible:
    id: "step3-screen"
