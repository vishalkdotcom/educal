appId: ${APP_ID}
---
# Shared helper: completes Step 1 only (1 child)
# Child: Sophia, age 8, University (default)

- assertVisible:
    id: "step1-screen"

- tapOn:
    id: "child-name-input-0"
- inputText: "Sophia"
- tapOn:
    id: "child-age-input-0"
- inputText: "8"
- tapOn:
    id: "child-save-0"
- tapOn:
    id: "step1-next-button"

- assertVisible:
    id: "step2-screen"
